<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Home Chef | Recipes by Ingredients</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app">
    <section class="hero" aria-labelledby="page-title">
      <div class="hero__content">
        <p class="eyebrow">Spoonacular recipe finder</p>
        <h1 id="page-title">Find a dish using what you already have at home</h1>
        <p class="hero__text">
          Quickly discover recipes from your pantry, with a clear list of the ingredients you are missing.
        </p>

        <form class="search" id="searchForm">
          <label for="ingredientsInput">Ingredients</label>
          <div class="search__row">
            <input
              type="text"
              id="ingredientsInput"
              placeholder="chicken, potato, cheese, onion"
              autocomplete="off"
            >
            <button type="submit" id="searchButton">Find recipes</button>
          </div>
        </form>
      </div>
    </section>

    <section class="status-panel" aria-live="polite">
      <div class="loader" id="loader" hidden>
        <span></span>
        <p>Finding matching recipes...</p>
      </div>
      <p class="message" id="message"></p>
    </section>

    <section class="recipes-section" aria-labelledby="recipes-title">
      <div class="section-heading">
        <h2 id="recipes-title">Recipes</h2>
        <p id="resultsCount">Ready to search.</p>
      </div>
      <div class="recipes-grid" id="recipesGrid"></div>
    </section>
  </main>

  <div class="modal" id="recipeModal" hidden>
    <div class="modal__overlay" id="modalOverlay"></div>
    <article class="modal__content" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <button class="modal__close" id="modalClose" type="button" aria-label="Close dialog">&times;</button>
      <div class="modal__body" id="modalBody"></div>
    </article>
  </div>

  <script src="script.js"></script>
</body>
</html>
